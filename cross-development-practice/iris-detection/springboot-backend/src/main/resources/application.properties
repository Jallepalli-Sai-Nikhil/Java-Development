spring.application.name=springboot-backend
# ? Server Configuration
server.port=8080

# ? Flask Service URL (Feign will use this)
flask.service.url=http://127.0.0.1:5000

# ? Logging (optional but useful)
logging.level.root=INFO
logging.level.com.example.demo=DEBUG

# ? Feign Logging (very useful for debugging API calls)
logging.level.org.springframework.cloud.openfeign=DEBUG

# ?? Feign Timeout Config (important)
feign.client.config.default.connectTimeout=5000
feign.client.config.default.readTimeout=5000

# ? Enable Feign Compression (optional optimization)
feign.compression.request.enabled=true
feign.compression.response.enabled=true

# ? Jackson JSON Config (optional)
spring.jackson.serialization.FAIL_ON_EMPTY_BEANS=false